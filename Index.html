<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle • Life Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root { --primary: 59 130 246; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .chat-container { scrollbar-width: thin; scrollbar-color: #4b5563 #1f2937; }
        .message-bubble { max-width: 85%; padding: 14px 20px; border-radius: 20px; }
        .user-bubble { background: rgb(59 130 246); color: white; border-bottom-right-radius: 4px; }
        .assistant-bubble { background: rgb(31 41 55); border-bottom-left-radius: 4px; }

        .typing { display: inline-flex; align-items: center; }
        .typing-dot { height: 5px; width: 5px; background: #9ca3af; border-radius: 50%; animation: typing 1.2s infinite ease-in-out; margin: 0 2px; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex">
    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
        <div class="p-6 border-b border-zinc-800">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl shadow-lg">⟐</div>
                <div>
                    <h1 class="title-font text-2xl font-semibold tracking-tighter">Oracle</h1>
                    <p class="text-xs text-zinc-500 -mt-1">Life Simulation Engine</p>
                </div>
            </div>
        </div>
        
        <div class="p-4">
            <button onclick="newChat()" class="w-full flex items-center justify-center gap-2 bg-zinc-800 hover:bg-zinc-700 transition-colors text-white py-3 px-4 rounded-2xl font-medium">
                <i class="fas fa-plus"></i>
                <span>New Simulation</span>
            </button>
        </div>

        <div class="px-6 py-4 text-xs uppercase tracking-widest text-zinc-500 font-medium">Your Simulations</div>
        <div id="chat-history" class="flex-1 overflow-auto px-3 text-sm"></div>

        <div class="p-6 border-t border-zinc-800 mt-auto">
            <div class="glass rounded-3xl p-5">
                <div class="flex items-center gap-2 text-sm mb-3">
                    <i class="fas fa-key text-amber-400"></i>
                    <span class="font-medium">Groq API Key</span>
                </div>
                <input id="api-key" type="password" placeholder="gsk_..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                <button onclick="saveApiKey()" class="mt-3 w-full bg-white text-zinc-900 hover:bg-zinc-100 py-2.5 rounded-2xl text-sm font-semibold transition-colors">
                    Save Key
                </button>
                <p id="key-status" class="text-xs text-center mt-2 text-emerald-400 hidden">✓ Key saved</p>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="flex-1 flex flex-col">
        <div class="h-14 border-b border-zinc-800 bg-zinc-900/80 backdrop-blur-md flex items-center px-8 justify-between">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-zinc-800 text-xs px-4 py-1.5 rounded-3xl">
                    <span class="text-emerald-400">●</span>
                    <select id="model-select" onchange="switchModel()" class="bg-transparent focus:outline-none">
                        <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                        <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
                    </select>
                </div>
            </div>
            <div onclick="showHelp()" class="cursor-pointer flex items-center gap-2 hover:text-white text-zinc-400 transition-colors">
                <i class="fas fa-info-circle"></i> How it works
            </div>
        </div>

        <div id="chat-area" class="flex-1 overflow-auto p-8 chat-container bg-[radial-gradient(#27272a_1px,transparent_1px)] [background-size:30px_30px]">
            <div id="welcome-screen" class="max-w-3xl mx-auto h-full flex flex-col justify-center items-center text-center">
                <div class="w-24 h-24 bg-gradient-to-br from-blue-500 via-purple-500 to-violet-500 rounded-3xl flex items-center justify-center text-6xl mb-8 shadow-2xl">⟐</div>
                <h2 class="title-font text-5xl font-semibold tracking-tighter mb-4">Your Future, Spoken</h2>
                <p class="text-xl text-zinc-400 max-w-md">Realistic simulations with reliable TTS</p>
            </div>
            <div id="messages" class="max-w-3xl mx-auto space-y-8 hidden"></div>
        </div>

        <div class="p-6 bg-zinc-900 border-t border-zinc-800">
            <div class="max-w-3xl mx-auto">
                <div class="relative">
                    <textarea id="user-input" rows="1" class="w-full bg-zinc-800 border border-zinc-700 focus:border-blue-500 rounded-3xl px-7 py-5 pr-24 text-base resize-y min-h-[60px] max-h-[200px] focus:outline-none" placeholder="Describe your situation..."></textarea>
                    <button onclick="sendMessage()" class="absolute bottom-4 right-4 bg-blue-600 hover:bg-blue-500 w-11 h-11 rounded-2xl flex items-center justify-center text-white">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <p class="text-center text-[10px] text-zinc-500 mt-4">IndexedDB • Real-life grounded • Stable TTS</p>
            </div>
        </div>
    </div>

    <script>
        let apiKey = localStorage.getItem('groq_api_key') || '';
        let currentModel = 'llama-3.3-70b-versatile';
        let db = null;
        let currentConversationId = null;

        const DB_NAME = 'OracleDB';
        const STORE_NAME = 'conversations';

        const systemPrompt = `You are Oracle, a hyper-realistic personal life simulation AI. 
        Ground every simulation in real documented life stories, career changes, relocations, and proven experiences. 
        Provide concrete, step-by-step action plans, risk mitigations, timelines, and probabilistic outcomes.`;

        // IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = e => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = e => { db = e.target.result; resolve(); };
                request.onerror = e => reject(e.target.error);
            });
        }

        async function loadConversations() {
            if (!db) await initDB();
            return new Promise(resolve => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const req = tx.objectStore(STORE_NAME).getAll();
                req.onsuccess = () => resolve(req.result.sort((a,b) => b.timestamp - a.timestamp));
            });
        }

        async function saveConversation(conv) {
            if (!db) await initDB();
            return new Promise(resolve => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).put(conv);
                tx.oncomplete = resolve;
            });
        }

        // === Stable TTS ===
        function speak(text) {
            if (!('speechSynthesis' in window)) {
                alert("Text-to-Speech not supported in this browser. Try Chrome or Edge.");
                return;
            }

            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.96;
            utterance.pitch = 1.0;

            const voices = window.speechSynthesis.getVoices();
            const bestVoice = voices.find(v => 
                v.name.toLowerCase().includes('samantha') || 
                v.name.toLowerCase().includes('google') || 
                v.name.toLowerCase().includes('natural')
            ) || voices[0];

            if (bestVoice) utterance.voice = bestVoice;

            window.speechSynthesis.speak(utterance);
        }

        // App functions
        async function loadChatHistory() {
            const convs = await loadConversations();
            const container = document.getElementById('chat-history');
            container.innerHTML = '';
            convs.forEach(conv => {
                const el = document.createElement('div');
                el.className = `px-4 py-3 hover:bg-zinc-800 rounded-2xl cursor-pointer text-sm mb-1 ${conv.id === currentConversationId ? 'bg-zinc-800' : ''}`;
                el.innerHTML = `<div class="line-clamp-1 font-medium">${conv.title || 'New Simulation'}</div>
                                <div class="text-xs text-zinc-500">${new Date(conv.timestamp).toLocaleDateString()}</div>`;
                el.onclick = () => loadConversation(conv.id);
                container.appendChild(el);
            });
        }

        async function newChat() {
            currentConversationId = Date.now().toString();
            const newConv = { id: currentConversationId, title: "New Life Simulation", messages: [], timestamp: Date.now() };
            await saveConversation(newConv);
            await loadChatHistory();
            document.getElementById('welcome-screen').classList.remove('hidden');
            document.getElementById('messages').classList.add('hidden');
            document.getElementById('messages').innerHTML = '';
        }

        async function loadConversation(id) {
            if (!db) await initDB();
            const tx = db.transaction(STORE_NAME, 'readonly');
            const req = tx.objectStore(STORE_NAME).get(id);
            req.onsuccess = () => {
                const conv = req.result;
                if (!conv) return;
                currentConversationId = id;
                document.getElementById('welcome-screen').classList.add('hidden');
                const container = document.getElementById('messages');
                container.classList.remove('hidden');
                container.innerHTML = '';
                conv.messages.forEach(m => addMessageToUI(m.role, m.content));
                loadChatHistory();
            };
        }

        function addMessageToUI(role, content) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} group`;

            if (role === 'user') {
                div.innerHTML = `<div class="message-bubble user-bubble">${content}</div>`;
            } else {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'flex gap-4 w-full';
                msgDiv.innerHTML = `
                    <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-blue-500 rounded-2xl flex-shrink-0 flex items-center justify-center text-lg">⟐</div>
                    <div class="flex-1">
                        <div class="message-bubble assistant-bubble">${content}</div>
                        <button class="speak-btn mt-2 text-zinc-400 hover:text-blue-400 transition-colors">
                            <i class="fas fa-volume-up"></i>
                        </button>
                    </div>
                `;
                // Attach event listener safely
                msgDiv.querySelector('.speak-btn').addEventListener('click', () => speak(content));
                div.appendChild(msgDiv);
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message || !apiKey) {
                if (!apiKey) alert("Please add your Groq API key first.");
                return;
            }

            document.getElementById('welcome-screen').classList.add('hidden');
            const messagesContainer = document.getElementById('messages');
            messagesContainer.classList.remove('hidden');

            addMessageToUI('user', message);

            if (!currentConversationId) await newChat();

            let currentConv = (await loadConversations()).find(c => c.id === currentConversationId);
            if (!currentConv) return;

            currentConv.messages.push({ role: 'user', content: message });
            currentConv.title = message.substring(0, 45) + "...";
            await saveConversation(currentConv);

            input.value = '';

            const typingId = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = typingId;
            typingDiv.className = `flex justify-start`;
            typingDiv.innerHTML = `<div class="flex gap-4"><div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-blue-500 rounded-2xl flex items-center justify-center text-lg">⟐</div><div class="message-bubble assistant-bubble typing"><span class="typing-dot"></span><span class="typing-dot" style="animation-delay:150ms"></span><span class="typing-dot" style="animation-delay:300ms"></span></div></div>`;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: [{ role: "system", content: systemPrompt }, ...currentConv.messages],
                        temperature: 0.75,
                        max_tokens: 1500
                    })
                });

                if (!res.ok) throw new Error('API request failed');

                const data = await res.json();
                const reply = data.choices[0].message.content;

                document.getElementById(typingId).remove();
                addMessageToUI('assistant', reply);

                currentConv.messages.push({ role: 'assistant', content: reply });
                await saveConversation(currentConv);
                await loadChatHistory();
            } catch (e) {
                console.error(e);
                if (document.getElementById(typingId)) document.getElementById(typingId).remove();
                addMessageToUI('assistant', `<span class="text-red-400">Error: ${e.message}. Check your API key and connection.</span>`);
            }
        }

        function saveApiKey() {
            apiKey = document.getElementById('api-key').value.trim();
            if (apiKey) {
                localStorage.setItem('groq_api_key', apiKey);
                document.getElementById('key-status').classList.remove('hidden');
                setTimeout(() => document.getElementById('key-status').classList.add('hidden'), 2000);
            }
        }

        function switchModel() { currentModel = document.getElementById('model-select').value; }

        function showHelp() {
            alert("TTS should now work reliably on every message.\n\n• Best results in Chrome/Edge\n• Click the speaker icon 🔊");
        }

        document.getElementById('user-input').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        window.onload = async () => {
            if (apiKey) document.getElementById('api-key').value = apiKey;
            await initDB();
            await loadChatHistory();
            // Preload voices
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
            }
        };
    </script>
</body>
  </html>
