<!DOCTYPE html>
<html lang="en">
<head><link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipMind</title>
  <style>
    :root {
      --primary: #0066ff;
      --accent: #00d4ff;
      --bg: #f0f4ff;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #64748b;
    }
    body.dark {
      --bg: #0a0a1f;
      --card: #16213e;
      --text: #e0f0ff;
      --muted: #94a3b8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .menu-icon { font-size: 32px; cursor: pointer; padding: 4px 12px; border-radius: 12px; }
    h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 15px 35px rgba(0,102,255,0.12);
    }

    input, textarea {
      width: 100%;
      padding: 16px;
      border: 2px solid #e0e7ff;
      border-radius: 16px;
      font-size: 16px;
      margin-bottom: 12px;
      background: var(--card);
      color: var(--text);
    }
    body.dark input, body.dark textarea { border-color: #334155; }

    button {
      width: 100%;
      padding: 16px;
      margin: 8px 0;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-danger { background: #ef4444; color: white; }

    .clip {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      margin: 16px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .clip img { max-width: 100%; border-radius: 12px; margin-top: 10px; }
    .clip-date { color: var(--muted); font-size: 14px; margin-bottom: 10px; }
    .clip-text { 
      white-space: pre-wrap; 
      line-height: 1.5; 
      margin-bottom: 12px;
    }

    .clip-actions {
      display: flex;
      gap: 10px;
    }
    .clip-actions button { flex: 1; padding: 10px; font-size: 15px; }

    #sideMenu {
      position: fixed;
      top: 0;
      left: -100%;
      width: 280px;
      height: 100vh;
      background: var(--card);
      box-shadow: 4px 0 30px rgba(0,0,0,0.3);
      transition: left 0.4s ease;
      padding: 24px;
      z-index: 2000;
    }
    #sideMenu.open { left: 0; }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <div id="topBar" style="display:none;" class="top-bar">
    <div onclick="toggleMenu()" class="menu-icon">☰</div>
    <h1>ClipMind</h1>
    <button id="toggleMode" style="background:none;border:none;font-size:28px;cursor:pointer;">🌙</button>
  </div>

  <!-- Side Menu -->
  <div id="sideMenu">
    <h2>Menu</h2>
    <button onclick="switchPage(0);toggleMenu()" class="btn-primary" style="margin:8px 0">🏠 Home</button>
    <button onclick="switchPage(1);toggleMenu()" class="btn-primary" style="margin:8px 0">🔍 Explore</button>
    <button onclick="showBookmarklet();toggleMenu()" style="background:#64748b;color:white;margin-top:12px">📖 Save Full Web Page</button>
    <button onclick="showTerms();toggleMenu()" style="background:#64748b;color:white;margin-top:8px">Terms</button>
  </div>

  <!-- Password Screen -->
  <div id="passwordScreen" class="card">
    <h2 style="text-align:center">🔐 Unlock ClipMind</h2>
    <input type="password" id="masterPassword" placeholder="Master Password" style="margin-bottom:8px">
    <div id="strength" style="margin:10px 0;font-size:14px"></div>
    <button id="unlockBtn" class="btn-primary">Unlock</button>
    <button onclick="forgotPassword()" class="btn-danger" style="margin-top:12px">Forgot Password?</button>
  </div>

  <!-- Main App -->
  <div id="mainApp" style="display:none">
    <!-- HOME -->
    <div id="page0">
      <div class="card">
        <textarea id="clipInput" rows="5" placeholder="Paste text, article, note..."></textarea>
        <input type="text" id="tagsInput" placeholder="Tags (comma separated)">
        <button id="saveBtn" class="btn-primary">💾 Save Encrypted Clip</button>
        <button id="screenshotBtn" class="btn-accent">📸 Save Screenshot / Image</button>
      </div>

      <h3 style="margin:20px 0 10px 8px;">Recent Clips</h3>
      <div id="recentClips"></div>
    </div>

    <!-- EXPLORE -->
    <div id="page1" style="display:none">
      <div class="card">
        <input type="text" id="searchInput" placeholder="🔍 Search clips...">
      </div>
      <div id="searchResults"></div>
    </div>
  </div>

  <script>
    let allClips = [];
    let masterPassword = '';

    async function getKey(pw) {
      const enc = new TextEncoder();
      const keyMat = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveBits","deriveKey"]);
      return crypto.subtle.deriveKey({name:"PBKDF2", salt:enc.encode("clipmind-salt"), iterations:100000, hash:"SHA-256"}, keyMat, {name:"AES-GCM", length:256}, true, ["encrypt","decrypt"]);
    }

    async function saveEncrypted() {
      const key = await getKey(masterPassword);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const data = new TextEncoder().encode(JSON.stringify(allClips));
      const encrypted = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, data);
      localStorage.setItem('encryptedClips', JSON.stringify({iv: Array.from(iv), data: Array.from(new Uint8Array(encrypted))}));
    }

    async function loadClips() {
      const stored = localStorage.getItem('encryptedClips');
      if (stored) {
        const enc = JSON.parse(stored);
        const key = await getKey(masterPassword);
        const decrypted = await crypto.subtle.decrypt({name:"AES-GCM", iv:new Uint8Array(enc.iv)}, key, new Uint8Array(enc.data));
        allClips = JSON.parse(new TextDecoder().decode(decrypted));
      }
    }

    document.getElementById('unlockBtn').addEventListener('click', async () => {
      masterPassword = document.getElementById('masterPassword').value.trim();
      if (!masterPassword) return alert("Please enter your password");

      try {
        await loadClips();
        document.getElementById('passwordScreen').style.display = 'none';
        document.getElementById('topBar').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'block';
        switchPage(0);
      } catch(e) {
        alert("Wrong password or corrupted data");
      }
    });

    function forgotPassword() {
      if (confirm("⚠️ WARNING: This will delete ALL data permanently!")) {
        localStorage.removeItem('encryptedClips');
        location.reload();
      }
    }

    function toggleMenu() {
      document.getElementById('sideMenu').classList.toggle('open');
    }

    function switchPage(page) {
      document.getElementById('page0').style.display = page === 0 ? 'block' : 'none';
      document.getElementById('page1').style.display = page === 1 ? 'block' : 'none';
      if (page === 0) renderRecent();
      if (page === 1) renderExplore();
    }

    function renderRecent() {
      const container = document.getElementById('recentClips');
      container.innerHTML = '';
      const recent = allClips.slice(0, 8);
      if (recent.length === 0) {
        container.innerHTML = '<p style="text-align:center; opacity:0.6; padding:40px;">No clips yet. Save something!</p>';
        return;
      }
      recent.forEach((clip, i) => {
        const div = document.createElement('div');
        div.className = 'clip';
        let contentHTML = '';
        if (clip.type === 'image') {
          contentHTML = `<img src="${clip.data}" alt="clip">`;
        } else {
          contentHTML = `<p class="clip-text">\( {clip.text.substring(0, 280)} \){clip.text.length > 280 ? '...' : ''}</p>`;
        }
        div.innerHTML = `
          <div class="clip-date">${new Date(clip.date).toLocaleString()}</div>
          ${contentHTML}
          <div class="clip-actions">
            <button onclick="copyClip(${i})" style="background:#22c55e;color:white;">📋 Copy</button>
            <button onclick="deleteClip(${i})" style="background:#ef4444;color:white;">🗑 Delete</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function renderExplore() {
      const input = document.getElementById('searchInput');
      input.oninput = () => filterClips(input.value);
      filterClips(input.value);
    }

    function filterClips(term = '') {
      const container = document.getElementById('searchResults');
      container.innerHTML = '';
      const filtered = allClips.filter(c => 
        !term || (c.text || '').toLowerCase().includes(term.toLowerCase())
      );

      filtered.forEach((clip, i) => {
        const div = document.createElement('div');
        div.className = 'clip';
        let contentHTML = '';
        if (clip.type === 'image') {
          contentHTML = `<img src="${clip.data}" alt="clip">`;
        } else {
          contentHTML = `<p class="clip-text">\( {clip.text.substring(0, 350)} \){clip.text.length > 350 ? '...' : ''}</p>`;
        }
        div.innerHTML = `
          <div class="clip-date">${new Date(clip.date).toLocaleString()}</div>
          ${contentHTML}
          <div class="clip-actions">
            <button onclick="copyClip(${i})" style="background:#22c55e;color:white;">📋 Copy</button>
            <button onclick="deleteClip(${i})" style="background:#ef4444;color:white;">🗑 Delete</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    window.copyClip = function(i) {
      const clip = allClips[i];
      const text = clip.text || '[Image Clip]';
      navigator.clipboard.writeText(text).then(() => alert("✅ Copied!"));
    };

    window.deleteClip = async function(i) {
      if (confirm("Delete this clip?")) {
        allClips.splice(i, 1);
        await saveEncrypted();
        renderRecent();
        if (document.getElementById('page1').style.display === 'block') renderExplore();
      }
    };

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const text = document.getElementById('clipInput').value.trim();
      if (!text) return alert("Enter text first");
      allClips.unshift({ text, date: new Date().toISOString(), type: 'text' });
      await saveEncrypted();
      document.getElementById('clipInput').value = '';
      alert("✅ Saved!");
      renderRecent();
    });

    document.getElementById('screenshotBtn').addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async ev => {
          allClips.unshift({ data: ev.target.result, date: new Date().toISOString(), type: 'image' });
          await saveEncrypted();
          alert("✅ Image saved!");
          renderRecent();
        };
        reader.readAsDataURL(file);
      };
      input.click();
    });

    window.showBookmarklet = () => alert("Create bookmark with this URL:\n\njavascript:(function(){const t=document.title+'\\n\\n'+document.body.innerText.substring(0,8000);prompt('Copy to ClipMind:',t);})();");

    window.onload = () => document.getElementById('masterPassword').focus();
  </script>
</body>
  </html>
